services:
  prisma-studio:
    build: .
    container_name: prisma-studio
    ports:
      - "${STUDIO_PORT:-5555}:5555"
    env_file:
      - .env
    environment:
      - PRISMA_DB_PULL_ON_START=${PRISMA_DB_PULL_ON_START:-false}
    volumes:
      - ./prisma:/app/prisma
      - ./generated:/app/generated
    restart: unless-stopped
