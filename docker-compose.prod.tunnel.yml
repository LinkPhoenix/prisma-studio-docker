# SSH tunnel — bind 127.0.0.1 only. See: docs/vps-ssh-tunnel.md

services:
  prisma-studio:
    image: ghcr.io/linkphoenix/prisma-studio-docker:latest
    container_name: prisma-studio
    ports:
      - "127.0.0.1:5555:5555"
    env_file:
      - .env
    environment:
      - PRISMA_DB_PULL_ON_START=${PRISMA_DB_PULL_ON_START:-false}
    restart: unless-stopped
